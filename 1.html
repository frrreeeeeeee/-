<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星光花园 - 致青春</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'KaiTi', '楷体', 'STKaiti', serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            background: #1a1a1f;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
            background-image: url('tex/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.08);
            pointer-events: none;
        }

        .character {
            position: absolute;
            bottom: 5%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
            height: 60%;
            width: auto;
        }
        #character1 { left: 2%; }
        #character2 { right: 2%; }
        .character.visible { opacity: 1; }

        #text-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #speaker {
            color: #ffd699;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 30px;
            text-align: center;
        }

        #story-text {
            color: #ffffff;
            font-size: 36px;
            text-align: center;
            line-height: 1.8;
            max-width: 90%;
        }

        #page-indicator {
            position: absolute;
            bottom: 8px;
            left: 15px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
        }

        #ending-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
        }
        #ending-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #ending-text {
            color: #ffffff;
            font-size: 80px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        #ending-screen.visible #ending-text { opacity: 1; }
        #ending-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .side-btn {
            position: absolute;
            left: 8px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.5);
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sfx-btn { bottom: 43%; }
        #music-btn { bottom: 35%; }

        #menu-btn {
            position: absolute;
            right: 8px;
            bottom: 35%;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.5);
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
        }
        #menu-panel {
            position: absolute;
            right: 8px;
            bottom: 42%;
            width: 140px;
            padding: 10px;
            background: rgba(15, 15, 18, 0.92);
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 10;
        }
        #menu-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #restart-btn {
            width: 100%;
            padding: 8px;
            background: rgba(70, 120, 170, 0.9);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'KaiTi', '楷体', serif;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="overlay"></div>

    <img id="character1" class="character" src="tex/girl.png" alt="少女">
    <img id="character2" class="character" src="tex/boy.png" alt="旅人">

    <div id="text-area">
        <div id="speaker"></div>
        <div id="story-text"></div>
    </div>

    <div id="page-indicator"></div>

    <div id="ending-screen">
        <div id="ending-text">未完待续</div>
        <div id="ending-hint">点击屏幕重新开始</div>
    </div>

    <button id="sfx-btn" class="side-btn" onclick="toggleSFX()">♪</button>
    <button id="music-btn" class="side-btn" onclick="toggleMusic()">♫</button>
    <button id="menu-btn" onclick="toggleMenu()">...</button>
    <div id="menu-panel">
        <button id="restart-btn" onclick="restartStory()">重新开始</button>
    </div>
</div>

<script>
    const storyLines = [
        { text: "* 花园里，星光洒满每一片花瓣…… *", state: 0 },
        { text: "很久很久以前……", state: 0 },
        { text: "在那片被星光遗忘的花园里～", state: 0 },
        { text: "住着一位孤独的少女。", state: 1 },
        { text: "她有着一头如月光般的长发，", state: 1 },
        { text: "和一双藏着星辰的眼睛。", state: 1 },
        { text: "但她的眼中，总是映着寂寞。", state: 1 },
        { text: "她每天都在花园里徘徊……", state: 1 },
        { text: "等待一个能看见花开的人。", state: 1 },
        { text: "* 风轻轻吹过，花瓣随风飘落…… *", state: 0 },
        { text: "少女轻轻叹了口气。", state: 1 },
        { text: "'会有人来吗？'", state: 1 },
        { text: "她对着空无一人的花园问道。", state: 1 },
        { text: "日复一日，年复一年……", state: 0 },
        { text: "花开了又谢，谢了又开。", state: 0 },
        { text: "她始终是一个人。", state: 1 },
        { text: "直到那一天——", state: 0 },
        { text: "* 花园的门被轻轻推开了…… *", state: 0 },
        { text: "✨ 一道温暖的光照了进来 ✨", state: 0 },
        { text: "少女转过身，睁大了眼睛。", state: 1 },
        { text: "'你是……？'", state: 1 },
        { text: "门口站着一位陌生的旅人，", state: 3 },
        { text: "他的眼中也藏着星光。", state: 2 },
        { text: "'我听到了花开的声音。'", state: 2 },
        { text: "旅人轻声说道。", state: 2 },
        { text: "'所以顺着声音，找到了这里。'", state: 2 },
        { text: "少女愣住了。", state: 1 },
        { text: "'你……能听到花的声音？'", state: 1 },
        { text: "'嗯。'", state: 2 },
        { text: "旅人微笑着点了点头。", state: 2 },
        { text: "'每一朵花，都在呼唤你。'", state: 2 },
        { text: "少女的眼眶湿润了。", state: 1 },
        { text: "'原来……我不是一个人。'", state: 1 },
        { text: "* 那一刻，花园里所有的花都开了 *", state: 3 },
        { text: "✨ 花瓣漫天飞舞，星光如雨洒落 ✨", state: 3 },
        { text: "旅人伸出了手。", state: 2 },
        { text: "'愿意和我一起，去看更大的世界吗？'", state: 2 },
        { text: "少女擦了擦眼泪，", state: 1 },
        { text: "然后——", state: 0 },
        { text: "她笑了。", state: 1 },
        { text: "'好。'", state: 3 },
        { text: "* 两只手轻轻握在了一起 *", state: 3 },
        { text: "* 星光花园，从此不再寂寞 *", state: 3 },
        { text: "—— 致每一个等待被看见的灵魂 ——", state: 0 },
    ];

    let currentIndex = 0;
    let storyEnded = false;
    let musicOn = true;
    let sfxOn = true;

    const storyText = document.getElementById('story-text');
    const speaker = document.getElementById('speaker');
    const pageIndicator = document.getElementById('page-indicator');
    const character1 = document.getElementById('character1');
    const character2 = document.getElementById('character2');
    const endingScreen = document.getElementById('ending-screen');
    const musicBtn = document.getElementById('music-btn');
    const sfxBtn = document.getElementById('sfx-btn');
    const menuPanel = document.getElementById('menu-panel');

    // 背景音乐
    const bgm = new Audio('tex/bgm.mp3');
    bgm.loop = true;
    bgm.volume = 0.5;
    document.addEventListener('click', () => {
        if (musicOn && bgm.paused) bgm.play().catch(() => {});
    }, { once: true });

    // 音效
    const sfxFiles = [
        new Audio('sfx/robot.wav'),
        new Audio('sfx/siren.wav')
    ];
    sfxFiles.forEach(s => { s.volume = 0.6; });

    function playRandomSFX() {
        if (!sfxOn || sfxFiles.length === 0) return;
        const sfx = sfxFiles[Math.floor(Math.random() * sfxFiles.length)];
        sfx.currentTime = 0;
        sfx.play().catch(() => {});
    }

    function updateCharacters(state) {
        if (state === 1 || state === 3) character1.classList.add('visible');
        else character1.classList.remove('visible');
        if (state === 2 || state === 3) character2.classList.add('visible');
        else character2.classList.remove('visible');
    }

    function updateSpeaker(text, state) {
        if (text.startsWith("'") && state === 1) speaker.textContent = "少女";
        else if (text.startsWith("'") && state === 2) speaker.textContent = "旅人";
        else if (text.startsWith("'") && state === 3) speaker.textContent = "少女 & 旅人";
        else speaker.textContent = "";
    }

    function showCurrentLine() {
        const line = storyLines[currentIndex];
        storyText.textContent = line.text;
        updateCharacters(line.state);
        updateSpeaker(line.text, line.state);
        pageIndicator.textContent = `点击继续... (${currentIndex + 1}/${storyLines.length})`;
    }

    function showEnding() {
        storyEnded = true;
        character1.classList.remove('visible');
        character2.classList.remove('visible');
        endingScreen.classList.add('visible');
        pageIndicator.textContent = "点击屏幕重新开始";
        pageIndicator.style.color = "rgba(255,255,255,0.7)";
    }

    function hideEnding() {
        storyEnded = false;
        currentIndex = 0;
        endingScreen.classList.remove('visible');
        pageIndicator.style.color = "rgba(255,255,255,0.45)";
        showCurrentLine();
    }

    document.getElementById('container').addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        playRandomSFX();
        if (storyEnded) { hideEnding(); return; }
        if (currentIndex < storyLines.length - 1) {
            currentIndex++;
            showCurrentLine();
            if (currentIndex === storyLines.length - 1) setTimeout(showEnding, 800);
        } else { showEnding(); }
    });

    function toggleMusic() {
        if (musicOn) {
            bgm.pause();
            musicBtn.textContent = "=";
            musicBtn.style.color = "rgba(255,255,255,0.3)";
            musicOn = false;
        } else {
            bgm.play().catch(() => {});
            musicBtn.textContent = "♫";
            musicBtn.style.color = "rgba(255,255,255,0.5)";
            musicOn = true;
        }
    }

    function toggleSFX() {
        if (sfxOn) {
            sfxOn = false;
            sfxBtn.textContent = "=";
            sfxBtn.style.color = "rgba(255,255,255,0.3)";
        } else {
            sfxOn = true;
            sfxBtn.textContent = "♪";
            sfxBtn.style.color = "rgba(255,255,255,0.5)";
        }
    }

    function toggleMenu() { menuPanel.classList.toggle('visible'); }

    function restartStory() { hideEnding(); toggleMenu(); }

    showCurrentLine();
</script>

</body>
</html>
